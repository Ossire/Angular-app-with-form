<nav class="navbar">
    <div class="navbar-content">
        <div class="logo">
            <a routerLink="/">
                <img src="https://cdn-icons-png.flaticon.com/512/263/263142.png" alt="logo">
            </a>

        </div>

        <app-searchinput />

        <div class="nav-links-cart">
            <a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }"> Home</a>
            <a routerLink="/products" routerLinkActive="active-link"
                [routerLinkActiveOptions]="{ exact: true }">Products</a>
            <a routerLink="/products/new" routerLinkActive="active-link">Add</a>

            <div class="cart">

                <div class="cart-icon"><a routerLink="/cart" routerLinkActive="active-link">🛒</a> </div>
                @if (cart$ | async; as cart) {
                <span id="cartCount" class="badge">{{cart.length}}</span>
                }

            </div>
        </div>
    </div>
</nav>
