<div class="login-container">
    <div class="login-card">

        <h1 class="login-title">Welcome Back</h1>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">


            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" formControlName="email" class="form-input"
                    placeholder="Enter your email" />
                @if (hasError('email', 'required')) {
                <span class="error">Email is required</span>
                }
                @if (hasError('email', 'email')) {
                <span class="error">Enter a valid email</span>
                }
            </div>


            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" formControlName="password" class="form-input"
                    placeholder="Enter your password" />
                @if (hasError('password', 'required')) {
                <span class="error">Password is required</span>
                }
                @if (hasError('password', 'minlength')) {
                <span class="error">Password must be at least 6 characters</span>
                }
            </div>


            <button type="submit" class="login-button" [disabled]="loginForm.invalid">
                Login
            </button>
        </form>
    </div>
</div>
