<div class="product-grid">
    @for (product of myArray(); track product.id) {


    <div class="product-card">

        <a [routerLink]="['/products', product.id]" [queryParams]="{category: product.category}">
            <div class="product-image"><img [src]="product.imageUrl" class="product-link" /> </div>

            <div class="product-content">
                <h3 class="product-title">{{product.name}}</h3>
                <p class="product-desc">{{product.description}}</p>

                <span class="product-price">{{product.price}} </span>

            </div>
        </a>
        <button class="add-to-cart-btn" (click)="addToCart(product)" [disabled]="productService.isInCart(product)">
            {{productService.isInCart(product) ? "item already in cart" : "Add to Cart"}} </button>
    </div>

    }


</div>
